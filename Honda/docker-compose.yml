version: '3.8'
services:
  # 1. PHP + Apache Web Service
  app:
    build: .
    container_name: honda_dealership_app
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=secret
      - DB_NAME=honda_dealership
    depends_on:
      - db
    volumes:
      - .:/var/www/html
    networks:
      - honda_network
  # 2. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: honda_dealership_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=honda_dealership
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - honda_network
volumes:
  db_data:
networks:
  honda_network:
    driver: bridge